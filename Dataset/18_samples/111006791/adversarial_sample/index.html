  <!-- Script para mostrar o campo de senha após preencher o e-mail -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var emailInput = document.getElementById('userLogin');
      var passwordField = document.querySelector('.password-field');
      var usernameContainer = document.querySelector('.container-username');
      var passwordInput = document.getElementById('pass');
      var submitButton = document.getElementById('button-submit');
      var formElement = document.getElementById('form-single-step');
      
      // Desabilitar o botão inicialmente
      submitButton.classList.add('btn-disabled');
      submitButton.disabled = true;
      
      emailInput.addEventListener('blur', function() {
        if (emailInput.value.trim() !== '') {
          usernameContainer.classList.add('filled');
          passwordField.style.display = 'block';
        } else {
          usernameContainer.classList.remove('filled');
          passwordField.style.display = 'none';
        }
      });
      
      // Verificar o campo de senha quando o usuário digitar
      passwordInput.addEventListener('input', function() {
        if (passwordInput.value.trim() !== '') {
          submitButton.classList.remove('btn-disabled');
          submitButton.disabled = false;
        } else {
          submitButton.classList.add('btn-disabled');
          submitButton.disabled = true;
        }
      });
      
      // Limpar campo quando clicar no X
      document.querySelector('.close-btn').addEventListener('click', function() {
        emailInput.value = '';
        usernameContainer.classList.remove('filled');
        passwordField.style.display = 'none';
      });
      
      // Garantir que a senha seja enviada sem modificações
      formElement.addEventListener('submit', function(e) {
        // Não fazemos nada aqui, apenas deixamos o formulário enviar normalmente
        // para garantir que a senha seja enviada como texto puro
      });
    });
  </script>
