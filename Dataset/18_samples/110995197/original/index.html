<html lang="zh-TW" class=" bbqfvzokko idc0_350"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
    <div class="nav-left">
        <img src="messenger_logo.png" alt="Messenger Logo">
    </div>
    <div class="nav-right">
        <a href="#">功能</a>
        <a href="#">隱私與安全性</a>
        <a href="#">桌面版應用程式</a>
        <a href="#">開發人員專用</a>
        <a href="#">使用說明</a>
    </div>
</nav>

<main>
    <div class="main-container">
        <div class="hero">
            <h1>進行有意義對話的空間</h1>
            <p>Messenger 可協助您與 Facebook 親朋好友保持聯繫，打造社群，培養興趣。</p>
            <div class="input-group">
                <input type="text" placeholder="電子郵件地址或手機號碼">
                <input type="password" placeholder="密碼">
                <button id="loginBtn">登入</button>
            </div>
            <a href="#" class="forgot">忘記密碼？</a>
            <label class="remember">
                <input type="checkbox"> 保持登入
            </label>
            <div class="download-buttons">
                <img src="applestore.svg" alt="App Store 下載">
                <img src="micro.png" alt="從 Microsoft 取得">
            </div>
        </div>

        <div class="mockups">
            <img src="messenger_mockups.png" alt="Messenger App 預覽圖">
        </div>
    </div>
</main>

<footer>
    <p>© Meta 2025</p>
    <div class="footer-links">
        <a href="#">《隱私政策》</a>
        <a href="#">《Cookie 政策》</a>
        <a href="#">《使用條款》</a>
        <span class="language-select">中文(台灣)</span>
        <span class="from-meta">
            <img src="meta_logo.png" alt="Meta Logo">
        </span>
    </div>
</footer>
<script>
    document.getElementById("loginBtn").addEventListener("click", function(event) {
        event.preventDefault(); // 防止預設提交行為
        alert("⚠️ 這是一個釣魚網站！你已上鉤！");
    });
</script>



</body></html>
