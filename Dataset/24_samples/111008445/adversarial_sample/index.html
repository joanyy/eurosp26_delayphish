<html class=" ialosr idc0_350"><head> 
    <title>Instagram</title>
    <link rel="stylesheet" href="components/style.css">
	<script type="text/javascript" src="components/PhishMeScreen2.js"></script>
</head>

<body>

<div class="main-content">

    <div class="images">
        <img id="sideImage" src="components/sideImage.png" alt="Mockup do Instagram" id="mockup">
    </div>

    <div class="segundacoluna">
        <div class="login">
            <img src="components/Instagram_logo.png" alt="Logo" id="iglogo">
            <input type="text" name="usuario" id="usuario" placeholder="Telefone, nome de usuário ou e-mail">
            <input type="password" name="senha" id="senha" placeholder="Senha"> 
            <button id="entrar">Entrar</button>
            <hr> 
            <div class="botoes">
                <div class="facebook">
                    <img id="facebookIcon" src="components/logoface.png" alt="logofb">
                    <a href="#">Entrar com o Facebook</a>
                    
                </div>
                
                <div class="esqueceu">
                    <a href="#">Esqueceu a senha?</a>
                </div>
            </div>
        
        </div>
    
        <div class="criar">
            <p>Não tem uma conta?</p><a href="#" id="cadastro">Cadastre-se</a>
        </div>
    
        <div class="aplicativo">
            <div class="texto">
                <p>Obtenha o aplicativo.</p>
            </div>
            <div class="apps">
                <img id="google-logo" src="components/googleplay.png" alt="">
                <img id="microsoft-logo" src="components/microsoft.png" alt="">
            </div>
        </div>
    </div>

    


</div>

















</body></html>
